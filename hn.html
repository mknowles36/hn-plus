<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HN Processed Reader</title>
    <style>
        /* Base Hacker News styling */
        body {
            font-family: Verdana, Geneva, sans-serif;
            background-color: #f6f6ef; /* Standard HN background */
            color: #000000;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #ff6600; /* HN Orange */
            padding: 10px;
            font-weight: bold;
            font-size: 14pt;
        }

        .header a {
            color: white;
            text-decoration: none;
        }

        /* Toggle controls styling */
        .controls {
            padding: 12px 15px 0 15px;
            font-size: 10pt;
            display: flex;
            gap: 20px;
        }

        .controls label {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .controls input[type="radio"] {
            margin-right: 6px;
            cursor: pointer;
        }

        .container {
            padding: 15px;
        }

        .story {
            display: flex;
            align-items: flex-start; /* Align elements to the top line */
            margin-bottom: 15px;
        }

        .story input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 1px; /* Fine-tune vertical alignment with text */
            cursor: pointer;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Ordinal numbering styling */
        .ordinal {
            color: #828282;
            font-size: 10pt;
            min-width: 25px; /* Ensures double-digit numbers align cleanly */
            text-align: right;
            margin-right: 8px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .story-info {
            display: flex;
            flex-direction: column;
        }

        .story-title {
            font-size: 10pt;
        }

        /* 1. Base unvisited title link color */
        .story-title a {
            color: #000000; 
            text-decoration: none;
        }

        /* 2. Checked AND unvisited title link color */
        .story.processed .story-title a {
            color: #b3b3b3; /* Light silver/grey */
        }

        /* 3. Visited title link color (Forces purple for BOTH normal and processed states) */
        .story-title a:visited,
        .story.processed .story-title a:visited {
            color: #551A8B; /* Standard visited purple */
        }

        /* Subtext styling */
        .subtext {
            font-size: 8pt;
            color: #828282;
            margin-top: 4px;
        }

        .subtext a {
            color: #828282;
            text-decoration: none;
        }

        .subtext a:hover {
            text-decoration: underline;
        }

        .loading {
            font-size: 10pt;
            color: #828282;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="#">Hacker News Check</a>
    </div>

    <div class="controls">
        <label>
            <input type="radio" name="feedToggle" value="topstories" checked> 
            Top Stories
        </label>
        <label>
            <input type="radio" name="feedToggle" value="beststories"> 
            Most Active (Best)
        </label>
    </div>

    <div id="stories" class="container">
        <div class="loading">Fetching stories...</div>
    </div>

    <script>
        const storiesContainer = document.getElementById('stories');
        const feedToggles = document.querySelectorAll('input[name="feedToggle"]');
        const PROCESSED_KEY = 'hn_processed_items';
        const STORIES_TO_LOAD = 30; 
        const EXPIRATION_MS = 72 * 60 * 60 * 1000; // 72 hours in milliseconds
        
        // Helper function to convert Unix timestamp to relative time
        function timeSince(unixTimestamp) {
            const seconds = Math.floor(Date.now() / 1000) - unixTimestamp;
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) {
                const d = Math.floor(interval);
                return d + (d === 1 ? " day ago" : " days ago");
            }
            interval = seconds / 3600;
            if (interval > 1) {
                const h = Math.floor(interval);
                return h + (h === 1 ? " hour ago" : " hours ago");
            }
            interval = seconds / 60;
            if (interval > 1) {
                const m = Math.floor(interval);
                return m + (m === 1 ? " minute ago" : " minutes ago");
            }
            return Math.floor(seconds) + " seconds ago";
        }

        // Retrieve raw processed states from Local Storage
        function getProcessedStates() {
            try {
                return JSON.parse(localStorage.getItem(PROCESSED_KEY) || '{}');
            } catch (e) {
                return {};
            }
        }

        // Save a checked state with the current timestamp
        function setProcessedState(id, isProcessed) {
            const processed = getProcessedStates();
            if (isProcessed) {
                processed[id] = Date.now(); // Save exact click time
            } else {
                delete processed[id];
            }
            localStorage.setItem(PROCESSED_KEY, JSON.stringify(processed));
        }

        // Scans localStorage and removes entries older than 72 hours
        function cleanupProcessedStates() {
            const processed = getProcessedStates();
            const now = Date.now();
            let changed = false;

            for (const id in processed) {
                const timestamp = processed[id];

                // Migration: If the value is the old boolean 'true', update it to 'now'
                if (timestamp === true) {
                    processed[id] = now;
                    changed = true;
                } 
                // Purge: If the difference between now and the timestamp is > 72 hours
                else if (typeof timestamp === 'number' && (now - timestamp > EXPIRATION_MS)) {
                    delete processed[id];
                    changed = true;
                }
            }

            // Only write back to disk if we actually changed/deleted something
            if (changed) {
                localStorage.setItem(PROCESSED_KEY, JSON.stringify(processed));
            }
        }

        async function loadStories(feedType = 'topstories') {
            try {
                storiesContainer.innerHTML = `<div class="loading">Fetching ${feedType === 'topstories' ? 'front page' : 'most active'} stories...</div>`;
                
                const res = await fetch(`https://hacker-news.firebaseio.com/v0/${feedType}.json`);
                const ids = await res.json();
                const topIds = ids.slice(0, STORIES_TO_LOAD);
                
                storiesContainer.innerHTML = ''; 
                const processed = getProcessedStates(); // Fetch cleaned states

                for (let i = 0; i < topIds.length; i++) {
                    const id = topIds[i];
                    const itemRes = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`);
                    const item = await itemRes.json();
                    
                    if (!item) continue;

                    // 1. Row container
                    const div = document.createElement('div');
                    div.className = 'story';
                    if (processed[id]) {
                        div.classList.add('processed');
                    }

                    // 2. Checkbox
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = !!processed[id]; // !! converts the timestamp or undefined into true/false
                    checkbox.title = "Mark as processed";
                    
                    checkbox.addEventListener('change', (e) => {
                        const isChecked = e.target.checked;
                        setProcessedState(id, isChecked);
                        
                        if (isChecked) {
                            div.classList.add('processed');
                        } else {
                            div.classList.remove('processed');
                        }
                    });

                    // 3. Ordinal number
                    const ordinalDiv = document.createElement('div');
                    ordinalDiv.className = 'ordinal';
                    ordinalDiv.textContent = `${i + 1}.`;

                    // 4. Info container
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'story-info';

                    // 5. Title line
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'story-title';
                    const titleLink = document.createElement('a');
                    const hnItemUrl = `https://news.ycombinator.com/item?id=${id}`;
                    titleLink.href = item.url || hnItemUrl;
                    titleLink.target = '_blank'; 
                    titleLink.textContent = item.title;
                    titleDiv.appendChild(titleLink);

                    // 6. Subtext line
                    const subtextDiv = document.createElement('div');
                    subtextDiv.className = 'subtext';
                    
                    const score = item.score || 0;
                    const by = item.by || 'unknown';
                    const comments = item.descendants || 0;
                    const userUrl = `https://news.ycombinator.com/user?id=${by}`;
                    const timeAgo = timeSince(item.time);

                    subtextDiv.innerHTML = `
                        ${score} points by <a href="${userUrl}" target="_blank">${by}</a> 
                        <a href="${hnItemUrl}" target="_blank">${timeAgo}</a> | 
                        <a href="${hnItemUrl}" target="_blank">${comments} comments</a>
                    `;

                    // Assemble
                    infoDiv.appendChild(titleDiv);
                    infoDiv.appendChild(subtextDiv);
                    div.appendChild(checkbox);
                    div.appendChild(ordinalDiv);
                    div.appendChild(infoDiv);
                    
                    storiesContainer.appendChild(div);
                }
            } catch (e) {
                storiesContainer.innerHTML = '<div class="loading">Error loading stories from Hacker News API. Please try refreshing.</div>';
                console.error(e);
            }
        }

        // Listen for changes on the radio buttons
        feedToggles.forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    loadStories(e.target.value);
                }
            });
        });

        // Initialize App
        cleanupProcessedStates(); // Scour localStorage for expired items FIRST
        loadStories(); // Then load the UI
    </script>
</body>
</html>
