<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HN Processed Reader</title>
    <style>
        /* Base Hacker News styling */
        body {
            font-family: Verdana, Geneva, sans-serif;
            background-color: #f6f6ef; /* Standard HN background */
            color: #000000;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #ff6600; /* HN Orange */
            padding: 10px;
            font-weight: bold;
            font-size: 14pt;
        }

        .header a {
            color: white;
            text-decoration: none;
        }

        .container {
            padding: 15px;
        }

        .story {
            display: flex;
            align-items: flex-start; /* Align elements to the top line */
            margin-bottom: 15px;
        }

        .story input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 1px; /* Fine-tune vertical alignment with text */
            cursor: pointer;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Ordinal numbering styling */
        .ordinal {
            color: #828282;
            font-size: 10pt;
            min-width: 25px; /* Ensures double-digit numbers align cleanly */
            text-align: right;
            margin-right: 8px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .story-info {
            display: flex;
            flex-direction: column;
        }

        .story-title {
            font-size: 10pt;
        }

        /* 1. Base unvisited title link color */
        .story-title a {
            color: #000000; 
            text-decoration: none;
        }

        /* 2. Checked AND unvisited title link color */
        .story.processed .story-title a {
            color: #b3b3b3; /* Light silver/grey */
        }

        /* 3. Visited title link color (Forces purple for BOTH normal and processed states) */
        .story-title a:visited,
        .story.processed .story-title a:visited {
            color: #551A8B; /* Standard visited purple */
        }

        /* Subtext styling */
        .subtext {
            font-size: 8pt;
            color: #828282;
            margin-top: 4px;
        }

        .subtext a {
            color: #828282;
            text-decoration: none;
        }

        .subtext a:hover {
            text-decoration: underline;
        }

        .loading {
            font-size: 10pt;
            color: #828282;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="#">Hacker News Check</a>
    </div>

    <div id="stories" class="container">
        <div class="loading">Fetching front page stories...</div>
    </div>

    <script>
        const storiesContainer = document.getElementById('stories');
        const PROCESSED_KEY = 'hn_processed_items';
        const STORIES_TO_LOAD = 30; 
        
        // Helper function to convert Unix timestamp to relative time (e.g., "3 hours ago")
        function timeSince(unixTimestamp) {
            const seconds = Math.floor(Date.now() / 1000) - unixTimestamp;
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) {
                const d = Math.floor(interval);
                return d + (d === 1 ? " day ago" : " days ago");
            }
            interval = seconds / 3600;
            if (interval > 1) {
                const h = Math.floor(interval);
                return h + (h === 1 ? " hour ago" : " hours ago");
            }
            interval = seconds / 60;
            if (interval > 1) {
                const m = Math.floor(interval);
                return m + (m === 1 ? " minute ago" : " minutes ago");
            }
            return Math.floor(seconds) + " seconds ago";
        }

        // Retrieve checked states from the browser's Local Storage
        function getProcessedStates() {
            try {
                return JSON.parse(localStorage.getItem(PROCESSED_KEY) || '{}');
            } catch (e) {
                return {};
            }
        }

        // Save a checked state to Local Storage
        function setProcessedState(id, isProcessed) {
            const processed = getProcessedStates();
            if (isProcessed) {
                processed[id] = true;
            } else {
                delete processed[id];
            }
            localStorage.setItem(PROCESSED_KEY, JSON.stringify(processed));
        }

        async function loadStories() {
            try {
                // Fetch the IDs of the current top stories
                const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
                const ids = await res.json();
                const topIds = ids.slice(0, STORIES_TO_LOAD);
                
                storiesContainer.innerHTML = ''; // Clear loading text
                const processed = getProcessedStates();

                // Fetch data for each story
                for (let i = 0; i < topIds.length; i++) {
                    const id = topIds[i];
                    const itemRes = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`);
                    const item = await itemRes.json();
                    
                    if (!item) continue;

                    // 1. Create the row container
                    const div = document.createElement('div');
                    div.className = 'story';
                    if (processed[id]) {
                        div.classList.add('processed');
                    }

                    // 2. Create the checkbox
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = !!processed[id];
                    checkbox.title = "Mark as processed";
                    
                    // Toggle the visual class and save state when clicked
                    checkbox.addEventListener('change', (e) => {
                        const isChecked = e.target.checked;
                        setProcessedState(id, isChecked);
                        
                        if (isChecked) {
                            div.classList.add('processed');
                        } else {
                            div.classList.remove('processed');
                        }
                    });

                    // 3. Create the ordinal number
                    const ordinalDiv = document.createElement('div');
                    ordinalDiv.className = 'ordinal';
                    ordinalDiv.textContent = `${i + 1}.`;

                    // 4. Create the info container (Title + Subtext)
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'story-info';

                    // 5. Create the Title line
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'story-title';
                    const titleLink = document.createElement('a');
                    const hnItemUrl = `https://news.ycombinator.com/item?id=${id}`;
                    titleLink.href = item.url || hnItemUrl;
                    titleLink.target = '_blank'; 
                    titleLink.textContent = item.title;
                    titleDiv.appendChild(titleLink);

                    // 6. Create the Subtext line
                    const subtextDiv = document.createElement('div');
                    subtextDiv.className = 'subtext';
                    
                    const score = item.score || 0;
                    const by = item.by || 'unknown';
                    const comments = item.descendants || 0;
                    const userUrl = `https://news.ycombinator.com/user?id=${by}`;
                    const timeAgo = timeSince(item.time);

                    subtextDiv.innerHTML = `
                        ${score} points by <a href="${userUrl}" target="_blank">${by}</a> 
                        <a href="${hnItemUrl}" target="_blank">${timeAgo}</a> | 
                        <a href="${hnItemUrl}" target="_blank">${comments} comments</a>
                    `;

                    // Assemble the elements
                    infoDiv.appendChild(titleDiv);
                    infoDiv.appendChild(subtextDiv);
                    
                    div.appendChild(checkbox);
                    div.appendChild(ordinalDiv);
                    div.appendChild(infoDiv);
                    
                    storiesContainer.appendChild(div);
                }
            } catch (e) {
                storiesContainer.innerHTML = '<div class="loading">Error loading stories from Hacker News API. Please try refreshing.</div>';
                console.error(e);
            }
        }

        // Initialize
        loadStories();
    </script>
</body>
</html>
